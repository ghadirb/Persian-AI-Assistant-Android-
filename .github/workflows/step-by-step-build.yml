name: Step by Step Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Verify Java installation
      run: |
        echo "Java version:"
        java -version
        echo "JAVA_HOME: $JAVA_HOME"
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Verify Android SDK
      run: |
        echo "Android SDK location:"
        echo $ANDROID_SDK_ROOT
        ls -la $ANDROID_SDK_ROOT || echo "SDK not found"
    
    - name: Grant execute permission for gradlew
      run: |
        chmod +x gradlew
        ls -la gradlew
    
    - name: Test Gradle wrapper
      run: |
        echo "Testing gradlew --version"
        ./gradlew --version
    
    - name: List Gradle tasks
      run: |
        echo "Available Gradle tasks:"
        ./gradlew tasks --console=plain
    
    - name: Clean project
      run: |
        echo "Cleaning project..."
        ./gradlew clean --console=plain --stacktrace
    
    - name: Compile sources only
      run: |
        echo "Compiling sources..."
        ./gradlew compileDebugSources --console=plain --stacktrace
    
    - name: Build debug APK
      run: |
        echo "Building debug APK..."
        ./gradlew assembleDebug --console=plain --stacktrace
    
    - name: Verify APK creation
      run: |
        echo "Checking for APK files:"
        find . -name "*.apk" -type f || echo "No APK files found"
        ls -la app/build/outputs/apk/debug/ || echo "Debug APK directory not found"
    
    - name: Upload APK if exists
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: debug-apk
        path: app/build/outputs/apk/debug/*.apk
        if-no-files-found: ignore
