name: Manual Build (APK/AAB)

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Select Build Type'
        required: true
        default: 'debug'
        type: choice
        options:
        - debug
        - release

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        api-level: 34
        build-tools: 34.0.0
        
    - name: Cache Gradle Dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
          ~/.android/build-cache
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
          
    - name: Make gradlew executable
      run: chmod +x ./gradlew
      
    - name: Clean Project
      run: ./gradlew clean
      
    - name: Build Debug APK
      if: github.event.inputs.build_type == 'debug'
      run: ./gradlew assembleDebug --stacktrace
      
    - name: Build Release APK
      if: github.event.inputs.build_type == 'release'
      run: ./gradlew assembleRelease --stacktrace
      
    - name: Build Debug AAB
      if: github.event.inputs.build_type == 'debug'
      run: ./gradlew bundleDebug --stacktrace
      continue-on-error: true
      
    - name: Build Release AAB
      if: github.event.inputs.build_type == 'release'
      run: ./gradlew bundleRelease --stacktrace
      continue-on-error: true
      
    - name: List Build Outputs
      run: |
        echo "=== Build Outputs ==="
        find app/build/outputs -name "*.apk" -type f 2>/dev/null || echo "No APK files"
        find app/build/outputs -name "*.aab" -type f 2>/dev/null || echo "No AAB files"
        
    - name: Upload Debug APK
      if: github.event.inputs.build_type == 'debug'
      uses: actions/upload-artifact@v4
      with:
        name: debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
        if-no-files-found: warn
        
    - name: Upload Release APK
      if: github.event.inputs.build_type == 'release'
      uses: actions/upload-artifact@v4
      with:
        name: release-apk
        path: app/build/outputs/apk/release/app-release-unsigned.apk
        if-no-files-found: warn
        
    - name: Upload Debug AAB
      if: github.event.inputs.build_type == 'debug'
      uses: actions/upload-artifact@v4
      with:
        name: debug-aab
        path: app/build/outputs/bundle/debug/app-debug.aab
        if-no-files-found: ignore
        
    - name: Upload Release AAB
      if: github.event.inputs.build_type == 'release'
      uses: actions/upload-artifact@v4
      with:
        name: release-aab
        path: app/build/outputs/bundle/release/app-release.aab
        if-no-files-found: ignore
        
    - name: Build Summary
      if: always()
      run: |
        echo "## Build Results 📱" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        BUILD_TYPE="${{ github.event.inputs.build_type }}"
        echo "**Selected Build Type**: $BUILD_TYPE" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        if [ "$BUILD_TYPE" = "debug" ]; then
          if [ -f "app/build/outputs/apk/debug/app-debug.apk" ]; then
            APK_SIZE=$(du -h app/build/outputs/apk/debug/app-debug.apk | cut -f1)
            echo "✅ **Debug APK**: Built successfully ($APK_SIZE)" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Debug APK**: Build failed" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ -f "app/build/outputs/bundle/debug/app-debug.aab" ]; then
            AAB_SIZE=$(du -h app/build/outputs/bundle/debug/app-debug.aab | cut -f1)
            echo "✅ **Debug AAB**: Built successfully ($AAB_SIZE)" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ **Debug AAB**: Build failed (optional)" >> $GITHUB_STEP_SUMMARY
          fi
        else
          if [ -f "app/build/outputs/apk/release/app-release-unsigned.apk" ]; then
            APK_SIZE=$(du -h app/build/outputs/apk/release/app-release-unsigned.apk | cut -f1)
            echo "✅ **Release APK**: Built successfully ($APK_SIZE)" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Release APK**: Build failed" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ -f "app/build/outputs/bundle/release/app-release.aab" ]; then
            AAB_SIZE=$(du -h app/build/outputs/bundle/release/app-release.aab | cut -f1)
            echo "✅ **Release AAB**: Built successfully ($AAB_SIZE)" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ **Release AAB**: Build failed (optional)" >> $GITHUB_STEP_SUMMARY
          fi
        fi
        
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "📥 **Download**: Check the Artifacts section above" >> $GITHUB_STEP_SUMMARY
