name: Complete Build (APK + AAB)

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build Type'
        required: true
        default: 'debug'
        type: choice
        options:
        - debug
        - release
  push:
    branches: [ master, main ]
    tags: [ 'v*' ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        api-level: 34
        build-tools: 34.0.0
        
    - name: Cache Gradle Dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
          ~/.android/build-cache
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
          
    - name: Make gradlew executable
      run: chmod +x ./gradlew
      
    - name: Clean Project
      run: ./gradlew clean
      
    - name: Run Unit Tests
      run: ./gradlew testDebugUnitTest --continue
      continue-on-error: true
      
    - name: Build Debug APK
      if: ${{ github.event.inputs.build_type == 'debug' || github.event.inputs.build_type == '' }}
      run: ./gradlew assembleDebug --stacktrace
      
    - name: Build Release APK (unsigned)
      if: ${{ github.event.inputs.build_type == 'release' }}
      run: ./gradlew assembleRelease --stacktrace
      
    - name: Build Debug AAB
      if: ${{ github.event.inputs.build_type == 'debug' || github.event.inputs.build_type == '' }}
      run: ./gradlew bundleDebug --stacktrace
      continue-on-error: true
      
    - name: Build Release AAB (unsigned)
      if: ${{ github.event.inputs.build_type == 'release' }}
      run: ./gradlew bundleRelease --stacktrace
      continue-on-error: true
      
    - name: List All Build Outputs
      run: |
        echo "=== All Build Outputs ==="
        find app/build/outputs -type f \( -name "*.apk" -o -name "*.aab" \) 2>/dev/null || echo "No build outputs found"
        echo ""
        echo "=== APK Files ==="
        find app/build/outputs -name "*.apk" -type f -exec ls -lh {} \; 2>/dev/null || echo "No APK files"
        echo ""
        echo "=== AAB Files ==="
        find app/build/outputs -name "*.aab" -type f -exec ls -lh {} \; 2>/dev/null || echo "No AAB files"
        
    - name: Upload Debug APK
      if: ${{ github.event.inputs.build_type == 'debug' || github.event.inputs.build_type == '' }}
      uses: actions/upload-artifact@v4
      with:
        name: persian-ai-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
        if-no-files-found: warn
        
    - name: Upload Release APK
      if: ${{ github.event.inputs.build_type == 'release' }}
      uses: actions/upload-artifact@v4
      with:
        name: persian-ai-release-apk
        path: app/build/outputs/apk/release/app-release-unsigned.apk
        if-no-files-found: warn
        
    - name: Upload Debug AAB
      if: ${{ github.event.inputs.build_type == 'debug' || github.event.inputs.build_type == '' }}
      uses: actions/upload-artifact@v4
      with:
        name: persian-ai-debug-aab
        path: app/build/outputs/bundle/debug/app-debug.aab
        if-no-files-found: ignore
        
    - name: Upload Release AAB
      if: ${{ github.event.inputs.build_type == 'release' }}
      uses: actions/upload-artifact@v4
      with:
        name: persian-ai-release-aab
        path: app/build/outputs/bundle/release/app-release.aab
        if-no-files-found: ignore
        
    - name: Create GitHub Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: |
          app/build/outputs/apk/release/app-release-unsigned.apk
          app/build/outputs/bundle/release/app-release.aab
        generate_release_notes: true
        draft: false
        prerelease: false
        
    - name: Build Summary
      if: always()
      run: |
        echo "## Build Results 📱" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        BUILD_TYPE="${{ github.event.inputs.build_type }}"
        if [ -z "$BUILD_TYPE" ]; then
          BUILD_TYPE="debug"
        fi
        
        echo "**Build Type**: $BUILD_TYPE" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| File Type | Status | Size |" >> $GITHUB_STEP_SUMMARY
        echo "|-----------|--------|------|" >> $GITHUB_STEP_SUMMARY
        
        if [ "$BUILD_TYPE" = "debug" ]; then
          if [ -f "app/build/outputs/apk/debug/app-debug.apk" ]; then
            APK_SIZE=$(du -h app/build/outputs/apk/debug/app-debug.apk | cut -f1)
            echo "| Debug APK | ✅ Success | $APK_SIZE |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Debug APK | ❌ Failed | - |" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ -f "app/build/outputs/bundle/debug/app-debug.aab" ]; then
            AAB_SIZE=$(du -h app/build/outputs/bundle/debug/app-debug.aab | cut -f1)
            echo "| Debug AAB | ✅ Success | $AAB_SIZE |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Debug AAB | ❌ Failed | - |" >> $GITHUB_STEP_SUMMARY
          fi
        else
          if [ -f "app/build/outputs/apk/release/app-release-unsigned.apk" ]; then
            APK_SIZE=$(du -h app/build/outputs/apk/release/app-release-unsigned.apk | cut -f1)
            echo "| Release APK | ✅ Success | $APK_SIZE |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Release APK | ❌ Failed | - |" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ -f "app/build/outputs/bundle/release/app-release.aab" ]; then
            AAB_SIZE=$(du -h app/build/outputs/bundle/release/app-release.aab | cut -f1)
            echo "| Release AAB | ✅ Success | $AAB_SIZE |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Release AAB | ❌ Failed | - |" >> $GITHUB_STEP_SUMMARY
          fi
        fi
        
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "📥 **Download**: Check the Artifacts section above to download the built files" >> $GITHUB_STEP_SUMMARY
