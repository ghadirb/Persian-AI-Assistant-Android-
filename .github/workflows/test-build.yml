name: Test Build

on:
  workflow_dispatch:
  push:
    branches: [ master, main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        api-level: 34
        build-tools: 34.0.0
        
    - name: Cache Gradle Dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
          ~/.android/build-cache
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
          
    - name: Make gradlew executable
      run: chmod +x ./gradlew
      
    - name: Clean Project
      run: ./gradlew clean
      
    - name: Check Project Structure
      run: |
        echo "=== Root Directory ==="
        ls -la
        echo "=== App Directory ==="
        ls -la app/
        echo "=== Gradle Version ==="
        ./gradlew --version
        
    - name: Build Debug APK
      run: ./gradlew assembleDebug --stacktrace --info
      
    - name: List Build Outputs
      run: |
        echo "=== Build Outputs ==="
        find app/build/outputs -name "*.apk" -type f 2>/dev/null || echo "No APK files found"
        find app/build/outputs -name "*.aab" -type f 2>/dev/null || echo "No AAB files found"
        
    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: persian-ai-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
        if-no-files-found: warn
        
    - name: Build Summary
      if: always()
      run: |
        echo "## Build Results 📱" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        if [ -f "app/build/outputs/apk/debug/app-debug.apk" ]; then
          APK_SIZE=$(du -h app/build/outputs/apk/debug/app-debug.apk | cut -f1)
          echo "✅ **Debug APK**: Built successfully ($APK_SIZE)" >> $GITHUB_STEP_SUMMARY
          echo "📥 Download from Artifacts section above" >> $GITHUB_STEP_SUMMARY
        else
          echo "❌ **Debug APK**: Build failed" >> $GITHUB_STEP_SUMMARY
          echo "Check the build logs for errors" >> $GITHUB_STEP_SUMMARY
        fi
