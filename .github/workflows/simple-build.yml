name: Simple Android Build

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        api-level: 34
        build-tools: 34.0.0
        
    - name: Cache Gradle Dependencies
      uses: actions/cache@v3
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
          ~/.android/build-cache
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
          
    - name: Make gradlew executable
      run: chmod +x ./gradlew
      
    - name: Clean Project
      run: ./gradlew clean
      
    - name: Build Debug APK
      run: ./gradlew assembleDebug
      
    - name: Build Release APK (unsigned)
      run: ./gradlew assembleRelease
      continue-on-error: true
      
    - name: Build Release AAB (unsigned)
      run: ./gradlew bundleRelease
      continue-on-error: true
      
    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: persian-ai-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30
        
    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: persian-ai-release-apk
        path: app/build/outputs/apk/release/app-release-unsigned.apk
        retention-days: 30
      if: success() || failure()
        
    - name: Upload Release AAB
      uses: actions/upload-artifact@v4
      with:
        name: persian-ai-release-aab
        path: app/build/outputs/bundle/release/app-release.aab
        retention-days: 30
      if: success() || failure()
      
    - name: Build Summary
      run: |
        echo "## Build Results 🚀" >> $GITHUB_STEP_SUMMARY
        echo "| Build Type | Status | File Size |" >> $GITHUB_STEP_SUMMARY
        echo "|------------|--------|-----------|" >> $GITHUB_STEP_SUMMARY
        
        if [ -f "app/build/outputs/apk/debug/app-debug.apk" ]; then
          DEBUG_SIZE=$(du -h app/build/outputs/apk/debug/app-debug.apk | cut -f1)
          echo "| Debug APK | ✅ Success | $DEBUG_SIZE |" >> $GITHUB_STEP_SUMMARY
        else
          echo "| Debug APK | ❌ Failed | - |" >> $GITHUB_STEP_SUMMARY
        fi
        
        if [ -f "app/build/outputs/apk/release/app-release-unsigned.apk" ]; then
          RELEASE_SIZE=$(du -h app/build/outputs/apk/release/app-release-unsigned.apk | cut -f1)
          echo "| Release APK | ✅ Success | $RELEASE_SIZE |" >> $GITHUB_STEP_SUMMARY
        else
          echo "| Release APK | ❌ Failed | - |" >> $GITHUB_STEP_SUMMARY
        fi
        
        if [ -f "app/build/outputs/bundle/release/app-release.aab" ]; then
          AAB_SIZE=$(du -h app/build/outputs/bundle/release/app-release.aab | cut -f1)
          echo "| Release AAB | ✅ Success | $AAB_SIZE |" >> $GITHUB_STEP_SUMMARY
        else
          echo "| Release AAB | ❌ Failed | - |" >> $GITHUB_STEP_SUMMARY
        fi
