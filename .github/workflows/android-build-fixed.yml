name: Android Build (Fixed)

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        api-level: 34
        build-tools: 34.0.0
        
    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
          ~/.android/build-cache
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
          
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      
    - name: Clean project
      run: ./gradlew clean
      
    - name: Check Gradle version
      run: ./gradlew --version
      
    - name: Build Debug APK
      run: ./gradlew assembleDebug --stacktrace --info
      
    - name: Build Release APK (unsigned)
      run: ./gradlew assembleRelease --stacktrace --info
      continue-on-error: true
      
    - name: List build outputs
      run: |
        echo "=== Debug APK ==="
        find app/build/outputs -name "*.apk" -type f
        echo "=== AAB Files ==="
        find app/build/outputs -name "*.aab" -type f
        echo "=== All outputs ==="
        ls -la app/build/outputs/ || echo "No outputs directory"
        
    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: persian-ai-debug-apk
        path: app/build/outputs/apk/debug/*.apk
        if-no-files-found: warn
        
    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: persian-ai-release-apk
        path: app/build/outputs/apk/release/*.apk
        if-no-files-found: warn
      if: success() || failure()
      
    - name: Build Summary
      if: always()
      run: |
        echo "## Build Summary 📱" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        if [ -f app/build/outputs/apk/debug/app-debug.apk ]; then
          DEBUG_SIZE=$(du -h app/build/outputs/apk/debug/app-debug.apk | cut -f1)
          echo "✅ **Debug APK**: Built successfully ($DEBUG_SIZE)" >> $GITHUB_STEP_SUMMARY
        else
          echo "❌ **Debug APK**: Build failed" >> $GITHUB_STEP_SUMMARY
        fi
        
        if [ -f app/build/outputs/apk/release/app-release-unsigned.apk ]; then
          RELEASE_SIZE=$(du -h app/build/outputs/apk/release/app-release-unsigned.apk | cut -f1)
          echo "✅ **Release APK**: Built successfully ($RELEASE_SIZE)" >> $GITHUB_STEP_SUMMARY
        else
          echo "❌ **Release APK**: Build failed" >> $GITHUB_STEP_SUMMARY
        fi
