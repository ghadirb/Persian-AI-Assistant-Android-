name: Build APK/AAB

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'انتخاب نوع Build'
        required: true
        default: 'debug'
        type: choice
        options:
        - debug
        - release

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: دانلود کد پروژه
      uses: actions/checkout@v4
      
    - name: نصب Java 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: نصب Android SDK
      uses: android-actions/setup-android@v3
      with:
        api-level: 34
        build-tools: 34.0.0
        
    - name: Cache Gradle
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
          ~/.android/build-cache
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
          
    - name: اجازه اجرای Gradle
      run: chmod +x ./gradlew
      
    - name: پاک کردن پروژه
      run: ./gradlew clean
      
    - name: ساخت Debug APK
      if: github.event.inputs.build_type == 'debug'
      run: ./gradlew assembleDebug --stacktrace
      
    - name: ساخت Release APK
      if: github.event.inputs.build_type == 'release'
      run: ./gradlew assembleRelease --stacktrace
      
    - name: ساخت Debug AAB
      if: github.event.inputs.build_type == 'debug'
      run: ./gradlew bundleDebug --stacktrace
      continue-on-error: true
      
    - name: ساخت Release AAB
      if: github.event.inputs.build_type == 'release'
      run: ./gradlew bundleRelease --stacktrace
      continue-on-error: true
      
    - name: نمایش فایل‌های ساخته شده
      run: |
        echo "=== فایل‌های APK ==="
        find app/build/outputs -name "*.apk" -type f 2>/dev/null || echo "هیچ فایل APK یافت نشد"
        echo "=== فایل‌های AAB ==="
        find app/build/outputs -name "*.aab" -type f 2>/dev/null || echo "هیچ فایل AAB یافت نشد"
        
    - name: آپلود Debug APK
      if: github.event.inputs.build_type == 'debug'
      uses: actions/upload-artifact@v4
      with:
        name: debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
        if-no-files-found: warn
        
    - name: آپلود Release APK
      if: github.event.inputs.build_type == 'release'
      uses: actions/upload-artifact@v4
      with:
        name: release-apk
        path: app/build/outputs/apk/release/app-release-unsigned.apk
        if-no-files-found: warn
        
    - name: آپلود Debug AAB
      if: github.event.inputs.build_type == 'debug'
      uses: actions/upload-artifact@v4
      with:
        name: debug-aab
        path: app/build/outputs/bundle/debug/app-debug.aab
        if-no-files-found: ignore
        
    - name: آپلود Release AAB
      if: github.event.inputs.build_type == 'release'
      uses: actions/upload-artifact@v4
      with:
        name: release-aab
        path: app/build/outputs/bundle/release/app-release.aab
        if-no-files-found: ignore
        
    - name: خلاصه نتایج
      if: always()
      run: |
        echo "## نتایج Build 📱" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        BUILD_TYPE="${{ github.event.inputs.build_type }}"
        echo "**نوع Build انتخاب شده**: $BUILD_TYPE" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        if [ "$BUILD_TYPE" = "debug" ]; then
          if [ -f "app/build/outputs/apk/debug/app-debug.apk" ]; then
            APK_SIZE=$(du -h app/build/outputs/apk/debug/app-debug.apk | cut -f1)
            echo "✅ **Debug APK**: ساخته شد ($APK_SIZE)" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Debug APK**: خطا در ساخت" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ -f "app/build/outputs/bundle/debug/app-debug.aab" ]; then
            AAB_SIZE=$(du -h app/build/outputs/bundle/debug/app-debug.aab | cut -f1)
            echo "✅ **Debug AAB**: ساخته شد ($AAB_SIZE)" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ **Debug AAB**: خطا در ساخت (اختیاری)" >> $GITHUB_STEP_SUMMARY
          fi
        else
          if [ -f "app/build/outputs/apk/release/app-release-unsigned.apk" ]; then
            APK_SIZE=$(du -h app/build/outputs/apk/release/app-release-unsigned.apk | cut -f1)
            echo "✅ **Release APK**: ساخته شد ($APK_SIZE)" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Release APK**: خطا در ساخت" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ -f "app/build/outputs/bundle/release/app-release.aab" ]; then
            AAB_SIZE=$(du -h app/build/outputs/bundle/release/app-release.aab | cut -f1)
            echo "✅ **Release AAB**: ساخته شد ($AAB_SIZE)" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ **Release AAB**: خطا در ساخت (اختیاری)" >> $GITHUB_STEP_SUMMARY
          fi
        fi
        
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "📥 **دانلود**: فایل‌ها را از بخش Artifacts بالا دانلود کنید" >> $GITHUB_STEP_SUMMARY
